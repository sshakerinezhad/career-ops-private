# Portal Scanner Configuration — Shayan Shakeri
# Targeting: Research Engineer roles in frontier robotics (VLA/RL/embodied AI)
# and alignment/evals. US-first, Canada for stellar roles, remote-US-comp ideal.
#
# Companies with `api:` are hit directly (zero-token). Uncertain ATS slugs use
# scan_method: websearch as fallback.

scan_history:
  recheck_after_days: 45

# US + Canada focus. always_allow rescues multi-location postings.
location_filter:
  always_allow:
    - "United States"
    - "Toronto"
    - "Canada"
    - "Remote"
    - "San Francisco"
    - "New York"
  allow:
    - "Remote"
    - "United States"
    - "USA"
    - "US"
    - "Canada"
    - "Toronto"
    - "Vancouver"
    - "Montreal"
    - "San Francisco"
    - "Bay Area"
    - "Palo Alto"
    - "Mountain View"
    - "New York"
    - "Seattle"
    - "Boston"
    - "Austin"
    - "Pittsburgh"
    - "Redwood City"
    - "Sunnyvale"
    - "San Jose"
  block:
    - "India"
    - "Bengaluru"
    - "Singapore"
    - "Japan"
    - "Germany"
    - "France"
    - "Poland"
    - "Brazil"
    - "Australia"
    - "China"
    - "Shanghai"
    - "Beijing"

title_filter:
  positive:
    - "Research Engineer"
    - "Research Scientist"
    - "Researcher"
    - "Machine Learning"
    - "ML Engineer"
    - "Robotics"
