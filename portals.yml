    - "Agent"
    - "Agentic"
    - "Foundation Model"
    - "Deep Learning"
    - "Post-Training"
    - "Fine-tuning"
    - "RLHF"
  negative:
    - "Intern"
    - "Internship"
    - "New College Grad"
    - "Manager"
    - "Director"
    - "VP"
    - "Head of"
    - "Developer Relations"
    - "Advocate"
    - "Solutions Architect"
    - "Solution Architect"
    - "Program Manager"
    - "Product Manager"
    - "DevOps"
    - "Quality Assurance"
    - "Compliance"
    - "Cyber"
    - "VLSI"
    - "ASIC"
    - "Silicon"
    - "Hardware Security"
    - "IT "
    - "Support Engineer"
    - "Sales"
    - "Marketing"
    - "Recruiter"
    - "Recruiting"
    - "Account Executive"
    - "Account Manager"
    - "Customer Success"
    - "Legal"
    - "Counsel"
    - "Finance"
    - "Accountant"
    - "People Ops"
    - "Business Development"
    - "Communications"
    - "Designer"
    - "Web3"
    - "Blockchain"
    - "Crypto"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Member of Technical Staff"
    - "Research"

search_queries:
  - name: Ashby — Robotics/VLA Research
    query: 'site:jobs.ashbyhq.com "Research Engineer" robotics OR VLA OR "robot learning" OR embodied'
    enabled: true

  - name: Greenhouse — Robotics/VLA Research
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Research Engineer" robotics OR "robot learning" OR manipulation OR embodied'
    enabled: true

  - name: Lever — Robotics Research
    query: 'site:jobs.lever.co "Research Engineer" OR "Machine Learning" robotics OR "reinforcement learning"'
    enabled: true

  - name: Ashby — Alignment & Evals
    query: 'site:jobs.ashbyhq.com alignment OR evals OR "model evaluation" OR "red team" "Research Engineer" OR "Research Scientist"'
    enabled: true

  - name: Greenhouse — Alignment & Evals
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "alignment" OR "safety" OR "evaluations" "Research Engineer"'
    enabled: true

  - name: Frontier labs — Member of Technical Staff
    query: '"Member of Technical Staff" AI research site:jobs.ashbyhq.com OR site:job-boards.greenhouse.io'
    enabled: true

  - name: YC / Work at a Startup — Robotics & RL
    query: 'site:workatastartup.com "robotics" OR "reinforcement learning" OR "embodied" "engineer"'
    enabled: true

  - name: HN Who's Hiring — Robotics/Alignment
    query: 'site:news.ycombinator.com "robotics" OR "alignment" OR "research engineer" hiring'
    enabled: true

  - name: Ashby — Founding Engineer AI
    query: 'site:jobs.ashbyhq.com "Founding Engineer" OR "Founding AI Engineer" OR "Member of Technical Staff"'
    enabled: true

  - name: Greenhouse — Founding/MTS AI
    query: 'site:job-boards.greenhouse.io "Founding Engineer" OR "Member of Technical Staff" AI OR ML'
    enabled: true

  - name: ai-jobs.net — Research & Robotics
    query: 'site:ai-jobs.net "Research Engineer" OR "Robotics" OR "Reinforcement Learning" United States OR Remote'
    enabled: true

  - name: Post-training / RLHF roles
    query: '"post-training" OR "RLHF" OR "reward model" "research engineer" site:jobs.ashbyhq.com OR site:job-boards.greenhouse.io OR site:jobs.lever.co'
    enabled: true

  - name: High-comp AI startups — cross-portal
    query: '"AI" "research engineer" OR "ML engineer" "$300" OR "$350" OR "$400" site:jobs.ashbyhq.com OR site:job-boards.greenhouse.io'
    enabled: true

